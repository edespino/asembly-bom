---
products:
  cloudberry:
    components:
      core:
        - name: cloudberry
          url: git@github.com:apache/cloudberry.git
          branch: main
          configure_flags: |
            --disable-external-fts
            --enable-gpcloud
            --enable-gpfdist
            --enable-ic-proxy
            --enable-mapreduce
            --enable-orafce
            --enable-orca
            --enable-pax
            --enable-pxf
            --enable-tap-tests
            --with-gssapi
            --with-ldap
            --with-libbz2
            --with-libcurl
            --with-libxml
            --with-lz4
            --with-openssl
            --with-pam
            --with-perl
            --with-pgport=5432
            --with-python
            --with-ssl=openssl
            --with-uuid=e2fs
            --with-zstd
          steps: [clone, configure, build, install, test]

      extensions:
        - name: cloudberry-pxf
          url: git@github.com:apache/cloudberry-pxf.git
          branch: main
          configure_flags: |
            --with-cloudberry-core=/usr/local/cloudberry
          steps: [clone, configure, build, install, test]

        - name: hashdata-anon
          url: git@github.com:Synx-Data-Labs/hashdata-anon.git
          branch: upstream
          configure_flags: |
            --with-cloudberry-core=/usr/local/cloudberry
          steps: [clone]
